kind = "web"
previewPath = "/"
title = "Ylimit"
version = "1.0.0"
id = "artifacts/ylimit"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23927

[services.development]
run = "pnpm --filter @workspace/ylimit run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ylimit", "run", "build" ]
publicDir = "artifacts/ylimit/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23927"
BASE_PATH = "/"
